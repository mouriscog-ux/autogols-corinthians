<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoGols Brasileirão</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Main Menu -->
        <div id="menu-screen" class="screen">
            <h1 class="title">AUTOGOLS <span class="accent">BRASILEIRÃO</span></h1>
            
            <div class="selection-container">
                <div class="selection-box" id="player-selection">
                    <h2>Escolha seu Time</h2>
                    <div class="team-grid" id="team-list">
                        <!-- Filled by JS -->
                    </div>
                </div>

                <div class="selection-box secondary" id="opponent-selection">
                    <h2>Seu Primeiro Adversário</h2>
                    <div class="team-grid" id="opponent-list">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>

            <div class="difficulty-container">
                <h2>Dificuldade</h2>
                <div class="difficulty-options">
                    <button class="diff-btn" data-level="easy">Normal</button>
                    <button class="diff-btn" data-level="medium">Hard</button>
                    <button class="diff-btn active" data-level="hard">Nível Corinthians</button>
                </div>
            </div>

            <button id="start-btn" class="main-btn">INICIAR TORNEIO</button>
        </div>

        <!-- Game UI -->
        <div id="ui-layer" class="hidden">
            <div class="scoreboard">
                <div class="team-score player">
                    <img id="player-badge" src="" alt="">
                    <span id="player-goals">0</span>
                </div>
                <div class="match-info">
                    <div id="match-phase">OITAVAS DE FINAL</div>
                    <div class="vs">X</div>
                </div>
                <div class="team-score opponent">
                    <span id="opponent-goals">0</span>
                    <img id="opponent-badge" src="" alt="">
                </div>
            </div>
        </div>

        <!-- Trophy Screen -->
        <div id="victory-screen" class="screen hidden">
            <div class="trophy-container">
                <div class="trophy">🏆</div>
                <h1 id="victory-msg">Vai, CORINTHIANS!</h1>
                <button onclick="location.reload()" class="main-btn">JOGAR NOVAMENTE</button>
            </div>
        </div>

        <!-- Canvas for Three.js -->
        <canvas id="game-canvas"></canvas>
    </div>

    <!-- Scripts -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/",
            "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
          }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
